server {
  listen 80;
  server_name _;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;

  ssl_certificate /etc/nginx/certs/cloudflare.pem;
  ssl_certificate_key /etc/nginx/certs/cloudflare.key;

  server_name _;

  proxy_busy_buffers_size 512k;
  proxy_buffers 4 512k;
  proxy_buffer_size 256k;

  set_real_ip_from 0.0.0.0/0;
  real_ip_header X-Real-IP;
  real_ip_recursive on;

  # Docker DNS resolver so upstream container IP changes are picked up without nginx restart.
  resolver 127.0.0.11 valid=10s ipv6=off;

  location /auth/ {
    proxy_pass http://keycloak:8080/auth/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
  }

  location / {
    set $rdpgw_upstream https://rdpgw:9443;
    # Variable-based proxy_pass so Nginx can pick up rdpgw when it appears on the Docker network
    proxy_pass $rdpgw_upstream;

    proxy_redirect off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Port 9443;
    proxy_set_header X-Forwarded-Host $host:9443;
    proxy_set_header X-Forwarded-Server $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
  }
}
