services:
  keycloak:
    container_name: keycloak
    hostname: keycloak
    image: quay.io/keycloak/keycloak:26.5.5
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: true
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: https://${SERVER_HOSTNAME:?set SERVER_HOSTNAME in .env}/auth
    ports:
      - 8080:8080
      - 9000:9000
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
      - --http-relative-path=/auth
    healthcheck:
      test: [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/9000; \
          echo -en 'GET /health/ready' >&3; \
          # Give the server a moment to respond, then search for 'UP'
          if timeout 3 cat <&3 | grep -m 1 'UP'; then \
          exec 3<&-; exec 3>&-; exit 0; \
          else \
          exec 3<&-; exec 3>&-; exit 1; \
          fi",
        ]
      start_period: 10s
      interval: 5s
      timeout: 2s
      retries: 5

  nginx:
    container_name: nginx
    hostname: nginx
    image: nginx:1.29.6
    ports:
      - 80:80
      - 443:443
    restart: unless-stopped
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro

  rdpgw:
    container_name: rdpgw
    hostname: rdpgw
    build:
      context: rdpgw
    ports:
      - 9443:9443
    restart: unless-stopped
    depends_on:
      nginx:
        condition: service_started
      keycloak:
        condition: service_healthy
    environment:
      RDPGW_SERVER__SESSION_STORE: file
      RDPGW_SERVER__CERT_FILE: /opt/rdpgw/server.pem
      RDPGW_SERVER__KEY_FILE: /opt/rdpgw/key.pem
      RDPGW_SERVER__GATEWAY_ADDRESS: ${SERVER_HOSTNAME}
      RDPGW_SERVER__PORT: 9443
      RDPGW_SERVER__HOSTS: ${RDP_HOSTNAME:?set RDP_HOSTNAME in .env}:3389
      RDPGW_SERVER__ROUND_ROBIN: false
      RDPGW_OPEN_ID__PROVIDER_URL: https://${SERVER_HOSTNAME}/auth/realms/rdpgw
      RDPGW_OPEN_ID__CLIENT_ID: rdpgw
      RDPGW_OPEN_ID__CLIENT_SECRET: 2ce9164b-46a4-4ac0-a0d0-736c5e8ed704
      RDPGW_CLIENT__DEFAULTS: /etc/rdpgw/default.rdp
      RDPGW_CLIENT__USERNAME_TEMPLATE: "{{ username }}"
      RDPGW_CAPS__TOKEN_AUTH: true
      RDPGW_CAPS__IDLE_TIMEOUT: 0
